kind = "web"
previewPath = "/"
title = "Life Seal Calculator"
version = "1.0.0"
id = "artifacts/lifeseal-calculator"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21351

[services.development]
run = "pnpm --filter @workspace/lifeseal-calculator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lifeseal-calculator", "run", "build" ]
serve = "static"
publicDir = "artifacts/lifeseal-calculator/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21351"
BASE_PATH = "/"
